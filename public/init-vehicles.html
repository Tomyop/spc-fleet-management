<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Vehicles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            direction: rtl;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #45a049;
        }
        #log {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>إضافة المركبات إلى Firebase</h1>
        <p>هذه الصفحة تضيف المركبات الافتراضية إلى قاعدة بيانات Firebase</p>
        <button onclick="initVehicles()">إضافة المركبات</button>
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // Replace these with your actual Firebase config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const vehicles = [
            {
                plateNumber: '5-2621633',
                type: 'Hyundai Tucson',
                year: 2021,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'KMHJB81DBNU216228',
                status: 'داخل العمل',
                available: true,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2622144',
                type: 'Hyundai Tucson',
                year: 2021,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'KMHJB81DBNU127099',
                status: 'داخل العمل',
                available: true,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2970154',
                type: 'Hyundai Creta',
                year: 2024,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'MF3PB812ESJ144885',
                status: 'محجوزة',
                available: false,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2882336',
                type: 'Hyundai Creta',
                year: 2023,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'MALPB812EPM290301',
                status: 'داخل العمل',
                available: true,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2718951',
                type: 'Hyundai Creta',
                year: 2023,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'MALPB812EPM294350',
                status: 'داخل العمل',
                available: true,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2417421',
                type: 'TLC B6',
                year: 2021,
                color: 'أبيض',
                ownership: 'SPC',
                chassisNumber: 'JTMHX01J4M4228295',
                status: 'خارج العمل',
                available: false,

            },
            {
                plateNumber: '5-2417413',

            },
            {

                chassisNumber: 'KMJWA37RAFU706901',

            },
            {
                plateNumber: '5-2547657',

                year: 2018,
                color: 'رمادي',
                ownership: 'SPC',
                chassisNumber: 'KMHST8ICDJU842664',
                status: 'داخل العمل',
                available: true,
                createdAt: new Date().toISOString()
            },
            {
                plateNumber: '5-2549379',
                type: 'Hyundai Santa Fe',
                year: 2019,
                color: 'رمادي',
                ownership: 'SPC',
                chassisNumber: 'KMHS381FDLU206088',
                status: 'خارج العمل',
                available: false,
                createdAt: new Date().toISOString()
            }
        ];

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.className = type;
            p.textContent = message;
            logDiv.appendChild(p);
        }

        async function initVehicles() {
            try {
                log('بدء إضافة المركبات...', 'info');
                
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                
                for (const vehicle of vehicles) {
                    // Check if vehicle already exists
                    const q = query(collection(db, 'vehicles'), where('plateNumber', '==', vehicle.plateNumber));
                    const querySnapshot = await getDocs(q);
                    
                    if (querySnapshot.empty) {
                        await addDoc(collection(db, 'vehicles'), vehicle);
                        log(`تمت إضافة المركبة: ${vehicle.plateNumber}`, 'success');
                    } else {
                        log(`المركبة موجودة بالفعل: ${vehicle.plateNumber}`, 'info');
                    }
                }
                
                log('تمت إضافة جميع المركبات بنجاح!', 'success');
            } catch (error) {
                log(`خطأ: ${error.message}`, 'error');
                console.error('Error initializing vehicles:', error);
            }
        }

        window.initVehicles = initVehicles;
    </script>
</body>
</html>
